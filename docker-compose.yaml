version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: lees-backend
    ports:
      - "8000:8000"
    volumes:
      # This ensures your mead data survives a container restart
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000 
    container_name: lees-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped